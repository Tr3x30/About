<!DOCTYPE html>
<html>
<head>
</head>
<body>
<div class="border"></div>

<style>
  .border {
  width: 500px;
  height: 500px;
  border-radius: 250px;
  background-image: conic-gradient(red, green, red);
  animation: rotate 5s linear infinite;
  }
</style>

<style>
  @keyframes rotate {
  0% { rotate: 0deg; }
  100% { rotate: 360deg; }
}
</style>

</body>
</html>
